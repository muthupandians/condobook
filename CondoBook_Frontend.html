<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CondoBook — Facilities Booking Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #181c27;
  --surface2: #1e2436;
  --border: #2a3045;
  --accent: #7c9ef5;
  --accent2: #a78bfa;
  --gold: #f4c842;
  --green: #4ade80;
  --red: #f87171;
  --orange: #fb923c;
  --text: #e8eaf2;
  --muted: #7b82a0;
  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.topbar-brand { font-family: var(--font-display); font-size: 1.5rem; color: var(--accent); display: flex; align-items: center; gap: 10px; }
.topbar-nav { display: flex; gap: 4px; }
.nav-btn {
  background: none; border: none; color: var(--muted); font-family: var(--font-body);
  font-size: 0.875rem; padding: 8px 14px; border-radius: 10px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: rgba(124,158,245,0.15); color: var(--accent); }
.topbar-user { display: flex; align-items: center; gap: 12px; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 0.875rem; color: white;
}
.user-info { line-height: 1.2; }
.user-name { font-size: 0.875rem; font-weight: 500; }
.user-role { font-size: 0.75rem; color: var(--muted); }
.logout-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
  transition: all 0.2s;
}
.logout-btn:hover { border-color: var(--red); color: var(--red); }

.main { flex: 1; padding: 32px; max-width: 1280px; margin: 0 auto; width: 100%; }

/* ── AUTH PAGE ── */
.auth-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(124,158,245,0.08) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.06) 0%, transparent 50%);
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
  padding: 48px; width: 440px; box-shadow: var(--shadow);
}
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--accent); }
.auth-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
.auth-tab {
  flex: 1; background: none; border: none; color: var(--muted); font-family: var(--font-body);
  font-size: 0.875rem; padding: 12px; cursor: pointer; border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── FORM ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem;
  transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--accent); }
.form-select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; cursor: pointer; }
.form-select:focus { outline: none; border-color: var(--accent); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 22px; border-radius: 10px; font-family: var(--font-body); font-size: 0.875rem;
  font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none;
}
.btn-primary { background: var(--accent); color: #0f1117; width: 100%; }
.btn-primary:hover { background: #9ab5ff; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--border); }
.btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.btn-danger:hover { background: rgba(248,113,113,0.2); }
.btn-success { background: rgba(74,222,128,0.1); color: var(--green); border: 1px solid rgba(74,222,128,0.3); }
.btn-success:hover { background: rgba(74,222,128,0.2); }
.btn-sm { padding: 7px 14px; font-size: 0.8rem; border-radius: 8px; }
.btn-gold { background: rgba(244,200,66,0.1); color: var(--gold); border: 1px solid rgba(244,200,66,0.3); }

/* ── STATUS BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 500;
}
.badge-pending { background: rgba(251,146,60,0.15); color: var(--orange); }
.badge-approved { background: rgba(74,222,128,0.15); color: var(--green); }
.badge-rejected { background: rgba(248,113,113,0.15); color: var(--red); }
.badge-cancelled { background: rgba(123,130,160,0.15); color: var(--muted); }

/* ── PAGE HEADERS ── */
.page-header { margin-bottom: 32px; }
.page-header h2 { font-family: var(--font-display); font-size: 2rem; color: var(--text); }
.page-header p { color: var(--muted); margin-top: 6px; }

/* ── STAT CARDS ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 24px; transition: border-color 0.2s;
}
.stat-card:hover { border-color: var(--accent); }
.stat-value { font-family: var(--font-display); font-size: 2.5rem; color: var(--text); line-height: 1; }
.stat-label { color: var(--muted); font-size: 0.8rem; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-icon { font-size: 1.5rem; margin-bottom: 12px; }

/* ── FACILITIES GRID ── */
.facility-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.facility-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: all 0.25s; cursor: pointer;
}
.facility-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,158,245,0.15); }
.facility-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: var(--surface2); }
.facility-body { padding: 20px; }
.facility-name { font-family: var(--font-display); font-size: 1.25rem; margin-bottom: 6px; }
.facility-desc { color: var(--muted); font-size: 0.85rem; line-height: 1.5; margin-bottom: 14px; }
.facility-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
.meta-chip {
  background: var(--surface2); border-radius: 6px; padding: 4px 10px;
  font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 4px;
}
.meta-chip.free { color: var(--green); background: rgba(74,222,128,0.08); }

/* ── FILTERS ── */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: rgba(124,158,245,0.15); border-color: var(--accent); color: var(--accent); }

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; padding: 12px 16px; color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-weight: 500; }
.data-table td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
.data-table tr:hover td { background: var(--surface2); }
.data-table tr:last-child td { border-bottom: none; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
  width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header { padding: 28px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; }
.modal-title { font-family: var(--font-display); font-size: 1.5rem; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
.modal-body { padding: 24px 28px 28px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

/* ── TOAST ── */
.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
.toast {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 18px; font-size: 0.875rem; min-width: 280px; box-shadow: var(--shadow);
  animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h3 { font-family: var(--font-display); font-size: 1.4rem; color: var(--text); margin-bottom: 8px; }

/* ── ALERT ── */
.alert { padding: 14px 18px; border-radius: 10px; margin-bottom: 16px; font-size: 0.875rem; }
.alert-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }

/* ── TIME SLOTS ── */
.time-slots { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.time-slot {
  padding: 8px; border-radius: 8px; border: 1px solid var(--border); text-align: center;
  font-size: 0.78rem; cursor: pointer; transition: all 0.2s; background: var(--bg);
}
.time-slot:hover:not(.booked) { border-color: var(--accent); color: var(--accent); }
.time-slot.selected { background: var(--accent); border-color: var(--accent); color: #0f1117; font-weight: 600; }
.time-slot.booked { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: var(--red); cursor: not-allowed; font-size: 0.7rem; }

/* ── TABS ── */
.page-tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 24px; width: fit-content; }
.page-tab {
  background: none; border: none; color: var(--muted); font-family: var(--font-body);
  font-size: 0.875rem; padding: 9px 18px; border-radius: 9px; cursor: pointer; transition: all 0.2s;
}
.page-tab.active { background: var(--surface2); color: var(--text); }

/* ── RULE BOX ── */
.rules-box { background: rgba(244,200,66,0.06); border: 1px solid rgba(244,200,66,0.2); border-radius: 10px; padding: 14px 16px; font-size: 0.83rem; color: #c9a73a; line-height: 1.6; }

.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .row2 { grid-template-columns: 1fr; } }

.loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-family: var(--font-display); font-size: 1.4rem; }

.cost-display { background: var(--surface2); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
.cost-label { font-size: 0.85rem; color: var(--muted); }
.cost-value { font-family: var(--font-display); font-size: 1.5rem; color: var(--gold); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, createContext, useContext } = React;

const API = '/api';

// ─── CONTEXT ──────────────────────────────────────────────────────────────────

const AuthCtx = createContext(null);
const ToastCtx = createContext(null);

function useAuth() { return useContext(AuthCtx); }
function useToast() { return useContext(ToastCtx); }

// ─── API HELPER ───────────────────────────────────────────────────────────────

function apiFetch(path, opts = {}) {
  const token = localStorage.getItem('condo_token');
  return fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {})
    },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  }).then(async r => {
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  });
}

// ─── TOAST PROVIDER ───────────────────────────────────────────────────────────

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
  }, []);

  return (
    <ToastCtx.Provider value={toast}>
      {children}
      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={`toast ${t.type}`}>
            <span>{t.type === 'success' ? '✅' : '❌'}</span>
            {t.msg}
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────

function AuthPage({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ email: '', password: '', name: '', unit: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function submit(e) {
    e.preventDefault();
    setError(''); setLoading(true);
    try {
      const path = tab === 'login' ? '/auth/login' : '/auth/register';
      const body = tab === 'login'
        ? { email: form.email, password: form.password }
        : { email: form.email, password: form.password, name: form.name, unit: form.unit };
      const data = await apiFetch(path, { method: 'POST', body });
      localStorage.setItem('condo_token', data.token);
      toast('Welcome to CondoBook!');
      onLogin(data.user);
    } catch (err) {
      setError(err.message);
    } finally { setLoading(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-logo">
          <h1>🏢 CondoBook</h1>
          <p>Facilities Booking Portal · Residents Only</p>
        </div>

        <div className="auth-tabs">
          <button className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Sign In</button>
          <button className={`auth-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => setTab('register')}>Register</button>
        </div>

        {error && <div className="alert alert-error">{error}</div>}

        <form onSubmit={submit}>
          {tab === 'register' && (
            <>
              <div className="form-group">
                <label className="form-label">Full Name</label>
                <input className="form-input" placeholder="e.g. John Tan" value={form.name} onChange={set('name')} required/>
              </div>
              <div className="form-group">
                <label className="form-label">Unit Number</label>
                <input className="form-input" placeholder="e.g. #07-15" value={form.unit} onChange={set('unit')} required/>
              </div>
            </>
          )}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@email.com" value={form.email} onChange={set('email')} required/>
          </div>
          <div className="form-group" style={{marginBottom: 20}}>
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="••••••••" value={form.password} onChange={set('password')} required/>
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}>
            {loading ? 'Please wait…' : tab === 'login' ? '→ Sign In' : '→ Create Account'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ─── TOP BAR ─────────────────────────────────────────────────────────────────

function TopBar({ user, page, setPage, onLogout }) {
  const navItems = user.role === 'admin'
    ? [['dashboard', '📊 Dashboard'], ['facilities', '🏊 Facilities'], ['bookings', '📋 All Bookings'], ['users', '👥 Residents']]
    : [['facilities', '🏊 Facilities'], ['mybookings', '📋 My Bookings']];

  return (
    <div className="topbar">
      <div className="topbar-brand">🏢 CondoBook</div>
      <div className="topbar-nav">
        {navItems.map(([key, label]) => (
          <button key={key} className={`nav-btn ${page === key ? 'active' : ''}`} onClick={() => setPage(key)}>{label}</button>
        ))}
      </div>
      <div className="topbar-user">
        <div className="avatar">{user.name[0]}</div>
        <div className="user-info">
          <div className="user-name">{user.name}</div>
          <div className="user-role">{user.unit} · {user.role}</div>
        </div>
        <button className="logout-btn" onClick={onLogout}>Logout</button>
      </div>
    </div>
  );
}

// ─── DASHBOARD PAGE ───────────────────────────────────────────────────────────

function DashboardPage() {
  const [stats, setStats] = useState(null);
  const [recentBookings, setRecentBookings] = useState([]);

  useEffect(() => {
    apiFetch('/dashboard/stats').then(setStats).catch(console.error);
    apiFetch('/bookings').then(b => setRecentBookings(b.slice(0, 5))).catch(console.error);
  }, []);

  if (!stats) return <div className="loading">Loading dashboard…</div>;

  return (
    <div>
      <div className="page-header">
        <h2>Admin Dashboard</h2>
        <p>Overview of all facilities and bookings</p>
      </div>

      <div className="stats-grid">
        {[
          { icon: '📋', value: stats.total, label: 'Total Bookings' },
          { icon: '⏳', value: stats.pending, label: 'Pending Approval' },
          { icon: '✅', value: stats.approved, label: 'Approved' },
          { icon: '🏊', value: stats.facilities, label: 'Facilities' },
          { icon: '👥', value: stats.residents, label: 'Residents' },
          { icon: '💰', value: `$${stats.revenue}`, label: 'Revenue (SGD)' },
        ].map((s, i) => (
          <div key={i} className="stat-card">
            <div className="stat-icon">{s.icon}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      <div className="section-header">
        <div className="section-title">Facility Usage</div>
      </div>
      <div className="facility-grid" style={{marginBottom: 32}}>
        {stats.facilityStats.map(f => (
          <div key={f.id} className="stat-card" style={{display:'flex', alignItems:'center', gap:16, padding:'16px 20px'}}>
            <span style={{fontSize:'2rem'}}>{f.image}</span>
            <div>
              <div style={{fontWeight:500}}>{f.name}</div>
              <div style={{color:'var(--muted)', fontSize:'0.8rem'}}>{f.category}</div>
              <div style={{marginTop:4, fontSize:'0.85rem'}}>
                <span style={{color:'var(--accent)'}}>{f.totalBookings}</span>
                <span style={{color:'var(--muted)'}}> bookings · </span>
                <span style={{color:'var(--green)'}}>{f.approvedBookings}</span>
                <span style={{color:'var(--muted)'}}> approved</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      <div className="section-header">
        <div className="section-title">Recent Bookings</div>
      </div>
      <div className="table-wrap">
        <BookingsTable bookings={recentBookings} isAdmin={true} onRefresh={() => apiFetch('/bookings').then(b => setRecentBookings(b.slice(0,5)))} />
      </div>
    </div>
  );
}

// ─── FACILITIES PAGE ──────────────────────────────────────────────────────────

function FacilitiesPage({ isAdmin }) {
  const [facilities, setFacilities] = useState([]);
  const [filter, setFilter] = useState('All');
  const [booking, setBooking] = useState(null); // facility to book
  const [editFac, setEditFac] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const toast = useToast();

  const categories = ['All', 'Recreation', 'Entertainment', 'Events', 'Fitness', 'Sports'];

  useEffect(() => { loadFacilities(); }, []);

  function loadFacilities() {
    apiFetch('/facilities').then(setFacilities).catch(console.error);
  }

  async function deleteFacility(id) {
    if (!confirm('Delete this facility?')) return;
    try {
      await apiFetch(`/facilities/${id}`, { method: 'DELETE' });
      toast('Facility deleted');
      loadFacilities();
    } catch (e) { toast(e.message, 'error'); }
  }

  const filtered = filter === 'All' ? facilities : facilities.filter(f => f.category === filter);

  return (
    <div>
      <div className="page-header">
        <h2>Facilities</h2>
        <p>Browse and book condominium facilities</p>
      </div>

      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12, marginBottom:24}}>
        <div className="filters" style={{margin:0}}>
          {categories.map(c => (
            <button key={c} className={`filter-btn ${filter === c ? 'active' : ''}`} onClick={() => setFilter(c)}>{c}</button>
          ))}
        </div>
        {isAdmin && <button className="btn btn-secondary btn-sm" onClick={() => setShowAdd(true)}>+ Add Facility</button>}
      </div>

      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="icon">🏢</div>
          <h3>No facilities found</h3>
        </div>
      ) : (
        <div className="facility-grid">
          {filtered.map(f => (
            <div key={f.id} className="facility-card">
              <div className="facility-img">{f.image}</div>
              <div className="facility-body">
                <div className="facility-name">{f.name}</div>
                <div className="facility-desc">{f.description}</div>
                <div className="facility-meta">
                  <span className="meta-chip">👥 Max {f.capacity}</span>
                  <span className={`meta-chip ${f.pricePerHour === 0 ? 'free' : ''}`}>
                    {f.pricePerHour === 0 ? '✓ Free' : `$${f.pricePerHour}/hr`}
                  </span>
                  <span className="meta-chip" style={{textTransform:'capitalize'}}>{f.category}</span>
                </div>
                <div style={{display:'flex', gap:8}}>
                  <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={() => setBooking(f)}>
                    Book Now
                  </button>
                  {isAdmin && (
                    <>
                      <button className="btn btn-secondary btn-sm" onClick={() => setEditFac(f)}>Edit</button>
                      <button className="btn btn-danger btn-sm" onClick={() => deleteFacility(f.id)}>Del</button>
                    </>
                  )}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {booking && <BookingModal facility={booking} onClose={() => setBooking(null)} onSuccess={() => { setBooking(null); toast('Booking submitted! Awaiting approval.'); }} />}
      {(showAdd || editFac) && <FacilityModal facility={editFac} onClose={() => { setShowAdd(false); setEditFac(null); }} onSuccess={() => { loadFacilities(); setShowAdd(false); setEditFac(null); toast(editFac ? 'Facility updated' : 'Facility added'); }} />}
    </div>
  );
}

// ─── BOOKING MODAL ────────────────────────────────────────────────────────────

function BookingModal({ facility, onClose, onSuccess }) {
  const [date, setDate] = useState('');
  const [start, setStart] = useState('');
  const [end, setEnd] = useState('');
  const [pax, setPax] = useState(1);
  const [notes, setNotes] = useState('');
  const [slots, setSlots] = useState([]);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const hours = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];

  useEffect(() => {
    if (!date) return;
    apiFetch(`/bookings/availability?facilityId=${facility.id}&date=${date}`)
      .then(d => setSlots(d.bookedSlots))
      .catch(console.error);
  }, [date, facility.id]);

  function isBooked(h) {
    return slots.some(s => h >= s.startTime && h < s.endTime);
  }

  const duration = start && end ? parseInt(end) - parseInt(start) : 0;
  const cost = duration * facility.pricePerHour;

  async function submit() {
    setError('');
    if (!date || !start || !end) return setError('Please select date, start and end time');
    if (end <= start) return setError('End time must be after start time');
    setLoading(true);
    try {
      await apiFetch('/bookings', { method: 'POST', body: { facilityId: facility.id, date, startTime: start, endTime: end, pax, notes } });
      onSuccess();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }

  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const minDate = tomorrow.toISOString().split('T')[0];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div>
            <div className="modal-title">{facility.image} {facility.name}</div>
            <div style={{color:'var(--muted)', fontSize:'0.85rem', marginTop:4}}>{facility.description}</div>
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {facility.rules && <div className="rules-box" style={{marginBottom:20}}>⚠️ {facility.rules}</div>}
          {error && <div className="alert alert-error">{error}</div>}

          <div className="form-group">
            <label className="form-label">Date</label>
            <input className="form-input" type="date" min={minDate} value={date} onChange={e => { setDate(e.target.value); setStart(''); setEnd(''); }} />
          </div>

          {date && (
            <>
              <div className="form-group">
                <label className="form-label">Select Start Time</label>
                <div className="time-slots">
                  {hours.slice(0, -1).map(h => (
                    <div key={h}
                      className={`time-slot ${isBooked(h) ? 'booked' : ''} ${start === h ? 'selected' : ''}`}
                      onClick={() => !isBooked(h) && setStart(h)}>
                      {h}{isBooked(h) ? ' ✗' : ''}
                    </div>
                  ))}
                </div>
              </div>
              {start && (
                <div className="form-group">
                  <label className="form-label">Select End Time (after {start})</label>
                  <div className="time-slots">
                    {hours.filter(h => h > start).map(h => (
                      <div key={h}
                        className={`time-slot ${isBooked(h) ? 'booked' : ''} ${end === h ? 'selected' : ''}`}
                        onClick={() => !isBooked(h) && setEnd(h)}>
                        {h}{isBooked(h) ? ' ✗' : ''}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </>
          )}

          <div className="row2">
            <div className="form-group">
              <label className="form-label">Number of Pax</label>
              <input className="form-input" type="number" min="1" max={facility.capacity} value={pax} onChange={e => setPax(parseInt(e.target.value))} />
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Special Notes (optional)</label>
            <input className="form-input" placeholder="Any special requests…" value={notes} onChange={e => setNotes(e.target.value)} />
          </div>

          {start && end && end > start && (
            <div className="cost-display">
              <div>
                <div className="cost-label">{start} – {end} · {parseInt(end)-parseInt(start)}h · {pax} pax</div>
              </div>
              <div className="cost-value">{cost === 0 ? 'FREE' : `$${cost} SGD`}</div>
            </div>
          )}

          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={submit} disabled={loading} style={{width:'auto'}}>
              {loading ? 'Submitting…' : 'Submit Booking Request'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── FACILITY MODAL (Admin Add/Edit) ─────────────────────────────────────────

function FacilityModal({ facility, onClose, onSuccess }) {
  const [form, setForm] = useState(facility || { name:'', category:'Recreation', capacity:20, pricePerHour:0, description:'', image:'🏢', rules:'' });
  const [error, setError] = useState('');
  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function submit() {
    setError('');
    try {
      if (facility) {
        await apiFetch(`/facilities/${facility.id}`, { method: 'PUT', body: form });
      } else {
        await apiFetch('/facilities', { method: 'POST', body: form });
      }
      onSuccess();
    } catch (e) { setError(e.message); }
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <div className="modal-title">{facility ? 'Edit Facility' : 'Add Facility'}</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          {error && <div className="alert alert-error">{error}</div>}
          <div className="row2">
            <div className="form-group">
              <label className="form-label">Name</label>
              <input className="form-input" value={form.name} onChange={set('name')} />
            </div>
            <div className="form-group">
              <label className="form-label">Emoji Icon</label>
              <input className="form-input" value={form.image} onChange={set('image')} />
            </div>
          </div>
          <div className="row2">
            <div className="form-group">
              <label className="form-label">Category</label>
              <select className="form-select" value={form.category} onChange={set('category')}>
                {['Recreation','Entertainment','Events','Fitness','Sports'].map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">Capacity</label>
              <input className="form-input" type="number" value={form.capacity} onChange={set('capacity')} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Price per Hour (SGD, 0 = Free)</label>
            <input className="form-input" type="number" value={form.pricePerHour} onChange={set('pricePerHour')} />
          </div>
          <div className="form-group">
            <label className="form-label">Description</label>
            <input className="form-input" value={form.description} onChange={set('description')} />
          </div>
          <div className="form-group">
            <label className="form-label">Usage Rules</label>
            <input className="form-input" value={form.rules} onChange={set('rules')} />
          </div>
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={submit} style={{width:'auto'}}>
              {facility ? 'Save Changes' : 'Add Facility'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── BOOKINGS TABLE ───────────────────────────────────────────────────────────

function BookingsTable({ bookings, isAdmin, onRefresh }) {
  const toast = useToast();

  async function updateStatus(id, status) {
    try {
      await apiFetch(`/bookings/${id}/status`, { method: 'PUT', body: { status } });
      toast(`Booking ${status}`);
      onRefresh();
    } catch (e) { toast(e.message, 'error'); }
  }

  async function cancel(id) {
    if (!confirm('Cancel this booking?')) return;
    try {
      await apiFetch(`/bookings/${id}/cancel`, { method: 'PUT' });
      toast('Booking cancelled');
      onRefresh();
    } catch (e) { toast(e.message, 'error'); }
  }

  if (bookings.length === 0) return (
    <div className="empty-state">
      <div className="icon">📋</div>
      <h3>No bookings yet</h3>
      <p>Bookings will appear here once made</p>
    </div>
  );

  return (
    <table className="data-table">
      <thead>
        <tr>
          <th>Facility</th>
          {isAdmin && <th>Resident</th>}
          <th>Date & Time</th>
          <th>Pax</th>
          <th>Cost</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {bookings.map(b => (
          <tr key={b.id}>
            <td>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:'1.3rem'}}>{b.facility?.image}</span>
                <div>
                  <div style={{fontWeight:500}}>{b.facility?.name || b.facilityId}</div>
                  <div style={{color:'var(--muted)', fontSize:'0.75rem'}}>{b.notes}</div>
                </div>
              </div>
            </td>
            {isAdmin && (
              <td>
                <div style={{fontWeight:500}}>{b.userName}</div>
                <div style={{color:'var(--muted)', fontSize:'0.75rem'}}>{b.unit}</div>
              </td>
            )}
            <td>
              <div>{b.date}</div>
              <div style={{color:'var(--muted)', fontSize:'0.8rem'}}>{b.startTime} – {b.endTime}</div>
            </td>
            <td>{b.pax}</td>
            <td>{b.totalCost === 0 ? <span style={{color:'var(--green)'}}>Free</span> : `$${b.totalCost}`}</td>
            <td><span className={`badge badge-${b.status}`}>● {b.status}</span></td>
            <td>
              <div style={{display:'flex', gap:6}}>
                {isAdmin && b.status === 'pending' && (
                  <>
                    <button className="btn btn-success btn-sm" onClick={() => updateStatus(b.id, 'approved')}>✓ Approve</button>
                    <button className="btn btn-danger btn-sm" onClick={() => updateStatus(b.id, 'rejected')}>✗ Reject</button>
                  </>
                )}
                {!isAdmin && ['pending','approved'].includes(b.status) && (
                  <button className="btn btn-danger btn-sm" onClick={() => cancel(b.id)}>Cancel</button>
                )}
                {b.status === 'approved' && isAdmin && (
                  <button className="btn btn-danger btn-sm" onClick={() => cancel(b.id)}>Cancel</button>
                )}
              </div>
            </td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// ─── BOOKINGS PAGE ────────────────────────────────────────────────────────────

function BookingsPage({ isAdmin }) {
  const [bookings, setBookings] = useState([]);
  const [filter, setFilter] = useState('all');
  const [loading, setLoading] = useState(true);

  useEffect(() => { load(); }, []);

  function load() {
    setLoading(true);
    apiFetch('/bookings').then(b => { setBookings(b); setLoading(false); }).catch(console.error);
  }

  const filtered = filter === 'all' ? bookings : bookings.filter(b => b.status === filter);

  return (
    <div>
      <div className="page-header">
        <h2>{isAdmin ? 'All Bookings' : 'My Bookings'}</h2>
        <p>{isAdmin ? 'Review and manage resident booking requests' : 'Track your facility booking requests'}</p>
      </div>

      <div className="page-tabs">
        {[['all','All'],['pending','Pending'],['approved','Approved'],['rejected','Rejected'],['cancelled','Cancelled']].map(([k,l]) => (
          <button key={k} className={`page-tab ${filter === k ? 'active' : ''}`} onClick={() => setFilter(k)}>
            {l} {bookings.filter(b => k === 'all' || b.status === k).length > 0 && (
              <span style={{background:'var(--border)', borderRadius:'10px', padding:'1px 7px', fontSize:'0.75rem', marginLeft:4}}>
                {bookings.filter(b => k === 'all' || b.status === k).length}
              </span>
            )}
          </button>
        ))}
      </div>

      {loading ? <div className="loading">Loading bookings…</div> : (
        <div className="table-wrap">
          <BookingsTable bookings={filtered} isAdmin={isAdmin} onRefresh={load} />
        </div>
      )}
    </div>
  );
}

// ─── USERS PAGE ───────────────────────────────────────────────────────────────

function UsersPage() {
  const [users, setUsers] = useState([]);
  useEffect(() => { apiFetch('/users').then(setUsers).catch(console.error); }, []);

  return (
    <div>
      <div className="page-header">
        <h2>Residents</h2>
        <p>Registered residents and administrators</p>
      </div>
      <div className="table-wrap">
        <table className="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Unit</th><th>Role</th></tr></thead>
          <tbody>
            {users.map(u => (
              <tr key={u.id}>
                <td style={{display:'flex', alignItems:'center', gap:10}}>
                  <div className="avatar" style={{width:32,height:32,fontSize:'0.8rem'}}>{u.name[0]}</div>
                  {u.name}
                </td>
                <td style={{color:'var(--muted)'}}>{u.email}</td>
                <td>{u.unit}</td>
                <td><span className={`badge ${u.role === 'admin' ? 'badge-approved' : 'badge-pending'}`}>{u.role}</span></td>

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('facilities');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const token = localStorage.getItem('condo_token');
    if (token) {
      apiFetch('/auth/me')
        .then(u => { setUser(u); setPage(u.role === 'admin' ? 'dashboard' : 'facilities'); })
        .catch(() => localStorage.removeItem('condo_token'))
        .finally(() => setLoading(false));
    } else { setLoading(false); }
  }, []);

  function logout() {
    localStorage.removeItem('condo_token');
    setUser(null);
    setPage('facilities');
  }

  if (loading) return <div className="loading" style={{height:'100vh'}}>⏳ Loading…</div>;

  if (!user) return <AuthPage onLogin={u => { setUser(u); setPage(u.role === 'admin' ? 'dashboard' : 'facilities'); }} />;

  const isAdmin = user.role === 'admin';

  return (
    <div className="app">
      <TopBar user={user} page={page} setPage={setPage} onLogout={logout} />
      <div className="main">
        {page === 'dashboard' && isAdmin && <DashboardPage />}
        {page === 'facilities' && <FacilitiesPage isAdmin={isAdmin} />}
        {page === 'bookings' && isAdmin && <BookingsPage isAdmin={true} />}
        {page === 'mybookings' && !isAdmin && <BookingsPage isAdmin={false} />}
        {page === 'users' && isAdmin && <UsersPage />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider><App /></ToastProvider>
);
</script>
</body>
